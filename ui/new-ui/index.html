<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensagotchi</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f0f0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 24px;
      gap: 24px;
    }

    /* ── Left column: canvas + preset buttons ── */
    #left-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.0rem;
      font-weight: 700;
      color: #333;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    #canvas-wrap {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    #canvas-wrap canvas { display: block; }

    #presets {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      max-width: 480px;
    }

    button {
      padding: 6px 14px;
      border: 2px solid #b0d8d8;
      border-radius: 999px;
      background: white;
      color: #2a7a7a;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      text-transform: capitalize;
      letter-spacing: 0.02em;
    }

    button:hover  { background: #e0f5f5; border-color: #48b9b9; }
    button.active { background: #48b9b9; border-color: #48b9b9; color: white; }

    /* ── Right column: slider panel ── */
    #panel {
      flex: 1;
      max-width: 340px;
      max-height: calc(100vh - 48px);
      overflow-y: auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .group-title {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      color: #999;
      padding: 10px 0 4px;
      border-bottom: 1px solid #eee;
      margin-bottom: 2px;
    }

    .group-title:first-child { padding-top: 0; }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slider-label {
      font-size: 0.76rem;
      color: #555;
      width: 88px;
      flex-shrink: 0;
      text-align: right;
    }

    .slider-row input[type="range"] {
      flex: 1;
      height: 4px;
      accent-color: #48b9b9;
      cursor: pointer;
    }

    .slider-val {
      font-size: 0.76rem;
      color: #48b9b9;
      font-weight: 700;
      width: 26px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div id="left-col">
    <h1>Sensagotchi — State Lab</h1>
    <div id="canvas-wrap"></div>
    <div id="presets"></div>
  </div>

  <div id="panel"></div>

  <script src="monster.js"></script>
</body>
</html>
